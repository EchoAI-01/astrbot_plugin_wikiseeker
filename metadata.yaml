name: astrbot_plugin_wikiseeker
author: Chen
display_name: Wiki Seeker
short_desc: 让 LLM 主动检索 MediaWiki 站点获取准确信息，支持关键词触发、知识库沉淀与 skill 自进化
desc: >-
  Wiki Seeker — 让 LLM 在回复前主动从 MediaWiki 站点检索准确信息。支持多站点配置、关键词预搜索注入、
  LLM 自助调用工具搜索、与主动回复插件兼容；可将不再更新的游戏 wiki 沉淀进知识库，并把搜索经验持续沉淀为 skill。
version: "1.0.0"
astrbot_version: ">=4.0.0"
